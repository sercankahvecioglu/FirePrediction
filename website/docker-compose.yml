version: '3.8'

services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: flamesentinels-frontend
    volumes:
      - ./client:/app
      - shared-data:/app/uploads
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:5000
    depends_on:
      - backend
    networks:
      - flamesentinels-network
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: flamesentinels-backend
    ports:
      - "5001:5000"
    volumes:
      - ./server:/app
      - shared-data:/app/uploads
    environment:
      - PORT=5000
    networks:
      - flamesentinels-network
    restart: unless-stopped

networks:
  flamesentinels-network:
    driver: bridge 

volumes:
  shared-data:
